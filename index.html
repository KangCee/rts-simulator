<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RTS Country Manager - Dev Build</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #game-container { position: relative; width: 800px; height: 500px; background: #2c3e50; border: 4px solid #34495e; margin-top: 20px; overflow: hidden; }
        .province { position: absolute; width: 100px; height: 100px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 2px solid rgba(255,255,255,0.2); }
        .province:hover { transform: scale(1.05); box-shadow: 0 0 15px white; }
        .my-country { background: #27ae60; } /* สีประเทศมึง */
        .enemy-country { background: #c0392b; } /* สีศัตรู */
        .neutral { background: #7f8c8d; } /* พื้นที่ว่าง */
        
        #hud { width: 800px; display: flex; justify-content: space-around; background: #333; padding: 10px; border-bottom: 2px solid #555; }
        .stat { font-size: 18px; font-weight: bold; }
        .log { width: 800px; height: 100px; background: #000; margin-top: 10px; padding: 10px; overflow-y: scroll; font-size: 12px; color: #0f0; border: 1px solid #444; }
        
        /* เส้นทางการเดินทัพ */
        .troop-line { position: absolute; height: 4px; background: yellow; transform-origin: 0 50%; z-index: 10; pointer-events: none; transition: width 2s linear; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">เงิน: $<span id="money">100</span></div>
        <div class="stat">กำลังพล: <span id="manpower">500</span></div>
        <div class="stat">พื้นที่ครอบครอง: <span id="territory">1</span></div>
    </div>

    <div id="game-container" id="map">
        </div>

    <div class="log" id="game-log">>> ยินดีต้อนรับท่านผู้นำ! คลิกพื้นที่สีแดงเพื่อเริ่มการบุก...</div>

    <script>
        // --- DATA ---
        let gameState = {
            money: 100,
            manpower: 500,
            provinces: [
                { id: 0, name: "ฐานทัพหลัก", x: 50, y: 200, owner: 'player', troops: 100 },
                { id: 1, name: "เมืองหน้าด่าน", x: 250, y: 100, owner: 'enemy', troops: 50 },
                { id: 2, name: "เขตเสบียง", x: 250, y: 300, owner: 'enemy', troops: 80 },
                { id: 3, name: "เมืองหลวงศัตรู", x: 550, y: 200, owner: 'enemy', troops: 300 }
            ]
        };

        const container = document.getElementById('game-container');
        const log = document.getElementById('game-log');

        // --- CORE LOGIC ---

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(gameState.money);
            document.getElementById('manpower').innerText = gameState.manpower;
            document.getElementById('territory').innerText = gameState.provinces.filter(p => p.owner === 'player').length;
            renderMap();
        }

        function renderMap() {
            container.innerHTML = '';
            gameState.provinces.forEach(p => {
                const div = document.createElement('div');
                div.className = `province ${p.owner === 'player' ? 'my-country' : 'enemy-country'}`;
                div.style.left = p.x + 'px';
                div.style.top = p.y + 'px';
                div.innerHTML = `<b>${p.name}</b><br>🛡️ ${p.troops}`;
                div.onclick = () => handleAttack(p);
                container.appendChild(div);
            });
        }

        function handleAttack(target) {
            if (target.owner === 'player') {
                addLog("นี่คือพื้นที่ของเราเอง!");
                return;
            }

            const attackCost = 50; // ใช้เงินบุก
            if (gameState.money < attackCost) {
                addLog("เงินไม่พอส่งกองทัพ!");
                return;
            }

            gameState.money -= attackCost;
            addLog(`กำลังส่งทัพไปบุก ${target.name}... (รอ 2 วินาที)`);

            // จำลองการเดินทัพ (Visual)
            const line = document.createElement('div');
            line.className = 'troop-line';
            line.style.left = (gameState.provinces[0].x + 50) + 'px';
            line.style.top = (gameState.provinces[0].y + 50) + 'px';
            container.appendChild(line);

            // คำนวณผลการรบหลังจาก Delay (RTA Style)
            setTimeout(() => {
                const playerPower = Math.floor(Math.random() * gameState.manpower * 0.5);
                addLog(`เข้าปะทะ! พลังโจมตีของเรา: ${playerPower} VS ป้องกัน: ${target.troops}`);

                if (playerPower > target.troops) {
                    target.owner = 'player';
                    target.troops = Math.floor(playerPower - target.troops);
                    addLog(`ชัยชนะ! ยึดเมือง ${target.name} สำเร็จ!`);
                } else {
                    gameState.manpower -= 50;
                    addLog(`พ่ายแพ้! สูญเสียกำลังพลในสมรภูมิ...`);
                }
                line.remove();
                updateUI();
            }, 2000);
        }

        function addLog(msg) {
            log.innerHTML = `>> ${msg}<br>` + log.innerHTML;
        }

        // --- GAME LOOP (Tick System) ---
        setInterval(() => {
            // ทุกวินาที เงินจะเพิ่มตามจำนวนเมืองที่ครอง
            const playerProvinces = gameState.provinces.filter(p => p.owner === 'player').length;
            gameState.money += playerProvinces * 2;
            gameState.manpower += playerProvinces * 5;

            // ศัตรูก็สะสมกำลังเหมือนกัน (AI เบื้องต้น)
            gameState.provinces.filter(p => p.owner === 'enemy').forEach(p => {
                p.troops += 1; 
            });

            updateUI();
        }, 1000);

        // Start Game
        updateUI();
    </script>
</body>
</html>
