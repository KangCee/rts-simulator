<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL RTS: GLOBAL DOMINATION</title>
    <style>
        :root { --orange: #f39c12; --red: #c0392b; --green: #2ecc71; --bg: #0c0e12; --panel: rgba(20, 25, 35, 0.95); }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #eee; margin: 0; overflow: hidden; }
        
        /* UI Header */
        #header { position: fixed; top: 0; width: 100%; background: #13171f; padding: 10px; border-bottom: 2px solid #2a3441; display: flex; justify-content: space-around; z-index: 100; font-size: 14px; }
        .stat-val { color: var(--orange); font-weight: bold; }

        /* Map Area */
        #game-map { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #080a0f; }
        svg { width: 90%; height: auto; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        
        /* สไตล์ประเทศ */
        path { fill: #2c3e50; stroke: #1a1a1a; stroke-width: 0.5; transition: 0.3s; cursor: pointer; }
        path:hover { fill: #34495e; stroke: #fff; stroke-width: 1; }
        .player { fill: var(--green) !important; stroke: #fff; }
        .enemy { fill: var(--red) !important; }
        .selected { stroke: var(--orange) !important; stroke-width: 2 !important; filter: brightness(1.2); }

        /* Side Panel */
        #panel { position: fixed; right: 20px; top: 70px; width: 280px; background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 5px; display: none; box-shadow: -5px 5px 20px rgba(0,0,0,0.8); }
        button { width: 100%; padding: 12px; background: var(--red); color: white; border: none; cursor: pointer; font-family: inherit; font-weight: bold; margin-top: 15px; }
        button:hover { background: #e74c3c; }

        /* Console Log */
        #console { position: fixed; bottom: 0; left: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.8); padding: 15px; font-size: 12px; color: var(--green); overflow-y: auto; border-top: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="header">
    <div>YEAR: <span class="stat-val">2026</span></div>
    <div>FUNDS: <span id="money" class="stat-val">$0</span></div>
    <div>MANPOWER: <span id="manpower" class="stat-val">0</span></div>
    <div>TERRITORY: <span id="land" class="stat-val">0/7</span></div>
</div>

<div id="game-map">
    <svg viewBox="0 0 1000 500" id="world-svg">
        <path id="NA" d="M100,100 L250,100 L300,250 L150,300 L50,200 Z" data-name="North America" />
        <path id="SA" d="M200,310 L300,310 L280,480 L220,480 Z" data-name="South America" />
        <path id="EU" d="M450,100 L580,100 L580,200 L450,220 Z" data-name="Europe" />
        <path id="AF" d="M450,230 L600,230 L580,420 L480,420 Z" data-name="Africa" />
        <path id="RU" d="M600,50 L950,50 L900,200 L600,200 Z" data-name="Russia & North Asia" />
        <path id="SEA" d="M700,250 L850,250 L800,350 L700,350 Z" data-name="SE Asia (Thailand HQ)" />
        <path id="AU" d="M800,380 L950,380 L920,480 L820,480 Z" data-name="Australia" />
    </svg>
</div>

<div id="panel">
    <h2 id="p-name" style="color:var(--orange); margin-top:0;">Country</h2>
    <p>Garrison: <span id="p-troops" class="stat-val">0</span></p>
    <p>Income: <span id="p-income" class="stat-val">$0</span>/sec</p>
    <button id="btn-action">DEPLOY TROOPS ($500)</button>
</div>

<div id="console" id="log-box">>> SYSTEM INITIALIZED... READY FOR COMMAND, LEADER.</div>

<script>
    let state = {
        money: 1000,
        manpower: 5000,
        regions: {
            'SEA': { name: "South East Asia", owner: 'player', troops: 1000, income: 50 },
            'NA': { name: "North America", owner: 'enemy', troops: 2500, income: 100 },
            'SA': { name: "South America", owner: 'enemy', troops: 1200, income: 40 },
            'EU': { name: "Europe", owner: 'enemy', troops: 3000, income: 120 },
            'AF': { name: "Africa", owner: 'enemy', troops: 1500, income: 30 },
            'RU': { name: "Russia", owner: 'enemy', troops: 4500, income: 150 },
            'AU': { name: "Australia", owner: 'enemy', troops: 800, income: 20 }
        },
        selected: null
    };

    const logBox = document.getElementById('console');
    function addLog(msg) {
        logBox.innerHTML = `>> ${msg}<br>` + logBox.innerHTML;
    }

    function updateUI() {
        document.getElementById('money').innerText = "$" + Math.floor(state.money);
        document.getElementById('manpower').innerText = state.manpower;
        const owned = Object.values(state.regions).filter(r => r.owner === 'player').length;
        document.getElementById('land').innerText = owned + "/7";

        Object.keys(state.regions).forEach(id => {
            const el = document.getElementById(id);
            el.className = state.regions[id].owner;
            if (state.selected === id) el.classList.add('selected');
        });
    }

    // คลิกเลือกพื้นที่
    document.querySelectorAll('path').forEach(path => {
        path.addEventListener('click', () => {
            state.selected = path.id;
            const reg = state.regions[path.id];
            document.getElementById('panel').style.display = 'block';
            document.getElementById('p-name').innerText = reg.name;
            document.getElementById('p-troops').innerText = reg.troops;
            document.getElementById('p-income').innerText = reg.income;
            
            const btn = document.getElementById('btn-action');
            if(reg.owner === 'player') {
                btn.innerText = "UPGRADE DEFENSE ($1000)";
                btn.onclick = () => upgrade(path.id);
            } else {
                btn.innerText = "LAUNCH INVASION ($500)";
                btn.onclick = () => attack(path.id);
            }
            updateUI();
        });
    });

    function attack(id) {
        if (state.money < 500) return addLog("INSUFFICIENT FUNDS!");
        state.money -= 500;
        const reg = state.regions[id];
        addLog(`COMMAND: ATTACKING ${reg.name}...`);
        
        setTimeout(() => {
            let power = Math.random() * state.manpower * 0.5;
            if (power > reg.troops) {
                reg.owner = 'player';
                reg.troops = Math.floor(power - reg.troops);
                addLog(`SUCCESS: ${reg.name} HAS BEEN CONQUERED!`);
            } else {
                state.manpower -= Math.floor(reg.troops * 0.2);
                addLog(`FAILURE: INVASION OF ${reg.name} REPELLED.`);
            }
            updateUI();
        }, 1500);
    }

    function upgrade(id) {
        if (state.money < 1000) return addLog("NEED MORE MONEY!");
        state.money -= 1000;
        state.regions[id].troops += 500;
        state.regions[id].income += 20;
        addLog(`UPGRADE: ${state.regions[id].name} DEFENSES STRENGTHENED.`);
        updateUI();
    }

    // Game Loop
    setInterval(() => {
        Object.values(state.regions).forEach(r => {
            if (r.owner === 'player') {
                state.money += r.income / 10;
                state.manpower += 5;
            } else {
                r.troops += 2; // ศัตรูเก่งขึ้นเรื่อยๆ
            }
        });
        updateUI();
    }, 100); // รันเร็วๆ ให้ดูเรียลไทม์

    updateUI();
</script>

</body>
</html>
